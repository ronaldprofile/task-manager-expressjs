name: Tests Unit

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      JWT_SECRET: "test-secret-ci"
      JWT_EXPIRES_IN: "24h"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit
